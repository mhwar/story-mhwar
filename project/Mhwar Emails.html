<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قوالب إيميلات محور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f5f2;
    --panel: #ffffff;
    --ink: #14130f;
    --ink-2: #3a3832;
    --muted: #8a877f;
    --line: #eceae4;
    --line-2: #e2dfd7;
    --accent: #3d3a8c;
    --accent-soft: #ecebf7;
    --warm: #f2efe8;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
    font-feature-settings: "ss01";
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* ===== Landing page — mobile frame overrides (scoped to .lp-light) ===== */
  .lp-mobile-wrap .lp-light section,
  .lp-mobile-wrap .lp-light nav,
  .lp-mobile-wrap .lp-light footer { padding-left: 18px !important; padding-right: 18px !important; }
  .lp-mobile-wrap .lp-light section { padding-top: 32px !important; padding-bottom: 32px !important; }
  .lp-mobile-wrap .lp-light nav { padding-top: 12px !important; padding-bottom: 12px !important; }

  /* Typography */
  .lp-mobile-wrap .lp-light h1 { font-size: 30px !important; letter-spacing: -0.8px !important; line-height: 1.15 !important; }
  .lp-mobile-wrap .lp-light h2 { font-size: 22px !important; letter-spacing: -0.4px !important; line-height: 1.25 !important; }
  .lp-mobile-wrap .lp-light p { font-size: 13.5px !important; line-height: 1.7 !important; }

  /* All grid templates → single column by default */
  .lp-mobile-wrap .lp-light section [style*="grid-template-columns"],
  .lp-mobile-wrap .lp-light footer [style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
    gap: 16px !important;
  }

  /* Nav */
  .lp-mobile-wrap .lp-light nav > div:last-child { gap: 8px !important; flex-wrap: wrap; }
  .lp-mobile-wrap .lp-light nav a { display: none !important; }
  .lp-mobile-wrap .lp-light nav button { font-size: 11px !important; padding: 6px 11px !important; }

  /* Hero */
  .lp-mobile-wrap .lp-light #hero { padding: 24px 18px 28px !important; }
  .lp-mobile-wrap .lp-light #hero > div > div:first-child {
    flex-direction: column !important;
    align-items: flex-start !important;
    gap: 8px !important;
  }
  .lp-mobile-wrap .lp-light #hero > div > div:first-child > div:first-child,
  .lp-mobile-wrap .lp-light #hero > div > div:first-child > .mono { white-space: nowrap !important; }
  .lp-mobile-wrap .lp-light #hero h1 { max-width: 100% !important; font-size: 30px !important; margin-bottom: 12px !important; }
  .lp-mobile-wrap .lp-light #hero p { max-width: 100% !important; font-size: 13.5px !important; margin-bottom: 20px !important; }
  .lp-mobile-wrap .lp-light #hero > div > div[style*="repeat(4"] {
    grid-template-columns: 1fr 1fr !important;
    gap: 12px !important;
    padding: 14px 12px !important;
    margin-bottom: 20px !important;
  }
  .lp-mobile-wrap .lp-light #hero > div > div[style*="repeat(4"] > div {
    border-inline-start: none !important;
    padding-inline-start: 0 !important;
  }
  .lp-mobile-wrap .lp-light #hero > div > div[style*="repeat(4"] > div > div:first-child { font-size: 10px !important; margin-bottom: 4px !important; }
  .lp-mobile-wrap .lp-light #hero > div > div[style*="repeat(4"] > div > div:nth-child(2) { font-size: 13px !important; }
  .lp-mobile-wrap .lp-light #hero > div > div[style*="repeat(4"] > div > div:last-child { font-size: 10.5px !important; }
  /* Hero CTAs stack full width */
  .lp-mobile-wrap .lp-light #hero > div > div[style*="flex"][style*="gap"]:last-child {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 8px !important;
  }
  .lp-mobile-wrap .lp-light #hero > div > div[style*="flex"][style*="gap"]:last-child > button,
  .lp-mobile-wrap .lp-light #hero > div > div[style*="flex"][style*="gap"]:last-child > a {
    width: 100% !important;
    justify-content: center !important;
    padding: 13px 20px !important;
    font-size: 13.5px !important;
  }

  /* Confirmed status bar */
  .lp-mobile-wrap .lp-light section[style*="oklch(0.98"] > div {
    grid-template-columns: 1fr !important;
    text-align: center;
    gap: 14px !important;
  }
  .lp-mobile-wrap .lp-light section[style*="oklch(0.98"] > div > div:first-child {
    justify-self: center;
    width: 100px !important;
  }

  /* About — numbers scaled down */
  .lp-mobile-wrap .lp-light #about > div:last-child { grid-template-columns: repeat(2, 1fr) !important; gap: 18px !important; padding: 20px 0 !important; margin-top: 24px !important; }
  .lp-mobile-wrap .lp-light #about > div:last-child > div > div:first-child { font-size: 32px !important; letter-spacing: -1px !important; }
  .lp-mobile-wrap .lp-light #about > div:last-child > div > div:last-child { font-size: 11.5px !important; margin-top: 4px !important; }

  /* Agenda */
  .lp-mobile-wrap .lp-light #agenda > div > div > div {
    grid-template-columns: 48px 10px 1fr !important;
    gap: 10px !important;
    padding: 14px 0 !important;
  }
  .lp-mobile-wrap .lp-light #agenda > div > div > div > div:nth-child(2) { width: 8px !important; height: 8px !important; }
  .lp-mobile-wrap .lp-light #agenda > div > div > div > div:nth-child(4) { display: none !important; }

  /* Speakers — 2 columns, compact cards */
  .lp-mobile-wrap .lp-light #speakers [style*="repeat(3"] {
    grid-template-columns: 1fr 1fr !important;
    gap: 10px !important;
  }
  .lp-mobile-wrap .lp-light #speakers [style*="repeat(3"] > div { padding: 12px !important; }

  /* Community testimonials → 1 col */
  .lp-mobile-wrap .lp-light section [style*="repeat(3"] { grid-template-columns: 1fr !important; }

  /* CTA strip */
  .lp-mobile-wrap .lp-light section[style*="linear-gradient"] { padding-top: 48px !important; padding-bottom: 48px !important; }
  .lp-mobile-wrap .lp-light section[style*="linear-gradient"] h2 { font-size: 26px !important; letter-spacing: -0.6px !important; }
  .lp-mobile-wrap .lp-light section[style*="linear-gradient"] p { font-size: 13.5px !important; }
  .lp-mobile-wrap .lp-light section[style*="linear-gradient"] button { padding: 13px 22px !important; font-size: 13.5px !important; }

  /* FOOTER — simplified for mobile */
  .lp-mobile-wrap .lp-light footer { padding: 28px 18px 20px !important; }
  .lp-mobile-wrap .lp-light footer > div > div:first-child {
    grid-template-columns: 1fr !important;
    gap: 0 !important;
    padding-bottom: 20px !important;
  }
  /* Hide link columns — keep only brand */
  .lp-mobile-wrap .lp-light footer > div > div:first-child > div:nth-child(n+2) { display: none !important; }
  .lp-mobile-wrap .lp-light footer > div > div:last-child { gap: 8px !important; }
  .lp-mobile-wrap .lp-light footer > div > div:last-child > div { font-size: 10.5px !important; }
</style>
