document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:#22c79a; --amber:#f6b948;\n  }\n  *{box-sizing:border-box; margin:0; padding:0;}\n  html{scroll-behavior:smooth;}\n  body{\n    background:var(--ink); color:#fff;\n    font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;\n    -webkit-font-smoothing:antialiased; overflow-x:hidden;\n  }\n  .mono{font-family:'IBM Plex Mono',monospace;}\n  ::selection{background:var(--violet); color:#fff;}\n\n  /* progress rail */\n  #rail{position:fixed; top:0; inset-inline-start:0; height:3px; width:0%; z-index:200;\n    background:linear-gradient(90deg,var(--grad-a),var(--grad-b)); transition:width .1s linear;}\n\n  /* top brand */\n  #brand{position:fixed; top:20px; inset-inline-end:30px; z-index:150; display:flex; align-items:center; gap:9px;\n    opacity:0; transition:opacity .6s;}\n  #brand .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--grad-a),var(--grad-b));box-shadow:0 0 14px var(--violet);}\n  #brand b{font-size:15px;font-weight:600;letter-spacing:.5px;}\n  #brand.show{opacity:1;}\n\n  .act{position:relative;}\n  .stage{position:sticky; top:0; height:100vh; overflow:hidden; display:grid; place-items:center;}\n  .wrap{max-width:1100px; padding:0 28px; width:100%;}\n\n  /* generic reveal */\n  .rv{opacity:0; transform:translateY(30px); transition:opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1);}\n  .rv.in{opacity:1; transform:none;}\n  .rv{transition:opacity 1.05s cubic-bezier(.16,.7,.2,1), transform 1.05s cubic-bezier(.16,.7,.2,1);}\n  .rv.d1{transition-delay:.08s;} .rv.d2{transition-delay:.16s;} .rv.d3{transition-delay:.24s;} .rv.d4{transition-delay:.32s;}\n\n  h1,h2{font-weight:600; letter-spacing:-1px; line-height:1.08;}\n  .huge{font-size:clamp(44px,8vw,104px);}\n  .big{font-size:clamp(34px,6vw,76px);}\n  .kicker{font-size:13px; letter-spacing:3px; color:var(--violet-2); text-transform:uppercase; margin-bottom:18px; font-weight:600;}\n  .lede{font-size:clamp(17px,2.4vw,24px); color:#c9c7d6; line-height:1.7; max-width:640px; font-weight:300;}\n  .grad-text{background:linear-gradient(120deg,var(--grad-a),var(--grad-b)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}\n\n  /* HERO */\n  #hero .glow{position:absolute; width:120vmax; height:120vmax; border-radius:50%;\n    background:radial-gradient(circle, rgba(108,92,231,.35), transparent 60%); filter:blur(20px);\n    inset-inline-start:-30vmax; top:-40vmax;}\n  #hero .glow2{position:absolute; width:90vmax; height:90vmax; border-radius:50%;\n    background:radial-gradient(circle, rgba(232,121,185,.22), transparent 60%);\n    inset-inline-end:-30vmax; bottom:-40vmax;}\n  #hero .mark{width:74px;height:74px;border-radius:21px;display:grid;place-items:center;\n    background:linear-gradient(140deg,var(--grad-a),var(--grad-b));\n    box-shadow:0 24px 60px -16px rgba(108,92,231,.6); font-size:38px; font-weight:700;}\n\n  /* orbit system — your community revolves around you (the محور) */\n  .orbit{position:relative; width:300px; height:300px; margin:0 auto 30px;}\n  .orbit .mark{position:absolute; inset-inline-start:50%; top:50%; transform:translate(-50%,-50%); z-index:3;}\n  .orbit .ring{position:absolute; inset:0; border-radius:50%; border:1px solid rgba(255,255,255,.09); animation:spin linear infinite;}\n  .orbit .ring.r1{animation-duration:18s;}\n  .orbit .ring.r2{inset:-46px; animation-duration:30s; animation-direction:reverse; border-color:rgba(108,92,231,.18);}\n  .orbit .ring.r3{inset:-92px; animation-duration:44s; border-color:rgba(232,121,185,.12);}\n  .orbit .node{position:absolute; inset-inline-start:50%; top:-6px; transform:translateX(-50%);\n    width:13px;height:13px;border-radius:50%; box-shadow:0 0 14px currentColor;}\n  .orbit .ring.r1 .node{color:var(--violet-2); background:var(--violet-2);}\n  .orbit .ring.r2 .node{color:var(--green); background:var(--green);}\n  .orbit .ring.r3 .node{color:var(--amber); background:var(--amber);}\n  .orbit .node.alt{top:auto; bottom:-6px;}\n  .orbit .node.side{top:50%; inset-inline-start:-6px; transform:translateY(-50%);}\n  @keyframes spin{to{transform:rotate(360deg);}}\n  .orbit .ring.r2{inset:-46px;} .orbit .ring.r3{inset:-92px;}\n  #hero .scrollcue{position:absolute; bottom:34px; inset-inline:0; text-align:center; color:var(--muted); font-size:12px; letter-spacing:2px;}\n  #hero .scrollcue .arrow{display:block; margin:10px auto 0; width:22px; height:22px; border-inline-start:2px solid var(--muted); border-bottom:2px solid var(--muted); transform:rotate(-45deg); animation:bob 1.6s infinite;}\n  @keyframes bob{0%,100%{transform:rotate(-45deg) translate(0,0);opacity:.4;}50%{transform:rotate(-45deg) translate(-4px,4px);opacity:1;}}\n\n  /* PROBLEM — floating chaotic bubbles */\n  .bubbles{position:absolute; inset:0; pointer-events:none;}\n  .bubble{position:absolute; padding:10px 15px; border-radius:16px; font-size:13px; color:#fff;\n    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(6px);\n    white-space:nowrap; opacity:0; transform:scale(.6);}\n  .act.problem.lit .bubble{opacity:1; transform:scale(1); transition:opacity .7s, transform .7s;}\n\n  /* HORIZONTAL drag act */\n  #patterns .track{display:flex; gap:34px; will-change:transform; align-items:center; padding:0 8vw;}\n  .pcard{flex:0 0 min(78vw,460px); border-radius:28px; padding:40px; min-height:62vh;\n    display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden;\n    border:1px solid rgba(255,255,255,.12);}\n  .pcard .pno{font-size:13px; letter-spacing:3px; opacity:.7;}\n  .pcard h3{font-size:38px; font-weight:600; letter-spacing:-.5px; margin:6px 0 14px;}\n  .pcard p{font-size:16px; line-height:1.7; color:rgba(255,255,255,.82); font-weight:300;}\n  .pcard .ico{font-size:54px; margin-bottom:auto;}\n  .pcard ul{list-style:none; margin-top:22px; display:flex; flex-direction:column; gap:9px;}\n  .pcard li{font-size:13.5px; color:rgba(255,255,255,.9); display:flex; gap:8px; align-items:center;}\n  .pcard li::before{content:'›'; color:#fff; opacity:.6;}\n  #patterns .hint{position:absolute; bottom:30px; inset-inline:0; text-align:center; color:var(--muted); font-size:12px; letter-spacing:2px;}\n\n  /* FEATURE rows */\n  .feat{display:grid; grid-template-columns:1fr 1fr; gap:50px; align-items:center;}\n  .feat .visual{aspect-ratio:1/.82; border-radius:26px; position:relative; overflow:hidden;\n    border:1px solid rgba(255,255,255,.1); background:#14121f;}\n  .chip{display:inline-flex; align-items:center; gap:7px; padding:7px 13px; border-radius:999px; font-size:12.5px;\n    background:rgba(108,92,231,.16); border:1px solid rgba(108,92,231,.4); color:var(--violet-2); margin-bottom:18px;}\n\n  /* event tool cards */\n  .ecard{background:#15131f; border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:24px;\n    transition:transform .4s, border-color .4s;}\n  .ecard:hover{transform:translateY(-4px); border-color:rgba(108,92,231,.5);}\n  .ecard .en{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--violet-2); letter-spacing:2px; margin-bottom:14px;}\n  .ecard h4{font-size:19px; font-weight:600; margin-bottom:8px; letter-spacing:-.3px;}\n  .ecard p{font-size:13.5px; line-height:1.7; color:#b9b7c6; font-weight:300;}\n  /* use-case cards (light section) */\n  .ucard{background:#fff; border:1px solid #e9e5dc; border-radius:22px; padding:28px; transition:transform .4s, box-shadow .4s;}\n  .ucard:hover{transform:translateY(-4px); box-shadow:0 18px 40px -20px rgba(0,0,0,.18);}\n  .ucard .ui{font-size:34px; color:var(--violet); margin-bottom:14px;}\n  .ucard h4{font-size:20px; font-weight:600; color:var(--ink); margin-bottom:8px; letter-spacing:-.3px;}\n  .ucard p{font-size:14px; line-height:1.75; color:#5a5768; font-weight:400;}\n\n  /* scroll-driven expanding use-case feed */\n  #usecases{background:var(--paper); color:var(--ink); padding:14vh 0 18vh;}\n  .ucwrap{max-width:880px; margin:0 auto; padding:0 28px;}\n  .ufeed{display:flex; flex-direction:column; gap:26px; margin-top:8vh;}\n  .uc{background:#fff; border:1px solid #e9e5dc; border-radius:26px; padding:30px 34px;\n    transform:scale(.93); opacity:.5; filter:saturate(.6);\n    transition:transform .6s cubic-bezier(.2,.7,.2,1), opacity .6s, box-shadow .6s, filter .6s;}\n  .uc.active{transform:scale(1); opacity:1; filter:none; box-shadow:0 30px 70px -28px rgba(60,58,140,.4); border-color:var(--violet-2);}\n  .uc .uhead{display:flex; align-items:center; gap:16px;}\n  .uc .uic{width:54px;height:54px;border-radius:16px;flex-shrink:0;display:grid;place-items:center;font-size:26px;color:#fff;\n    background:linear-gradient(140deg,var(--grad-a),var(--grad-b));}\n  .uc h4{font-size:23px; font-weight:600; color:var(--ink); letter-spacing:-.4px;}\n  .uc .utag{font-size:12.5px; color:var(--muted); margin-top:3px;}\n  .uc .more{max-height:0; opacity:0; overflow:hidden; transition:max-height .7s ease, opacity .5s, margin .5s; margin-top:0;}\n  .uc.active .more{max-height:340px; opacity:1; margin-top:20px;}\n  .uc .more p{font-size:14.5px; line-height:1.8; color:#4a4856;}\n  .uc .toolrow{display:flex; flex-wrap:wrap; gap:9px; margin-top:18px;}\n  .uc .tool{display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:500;\n    padding:7px 14px 7px 8px; border-radius:13px; background:#f6f4ee; color:#3a3850; border:1px solid #e7e3d9;\n    transition:background .4s, border-color .4s, transform .25s;}\n  .uc.active .tool{background:#fff;}\n  .uc .tool:hover{transform:translateY(-2px); border-color:var(--violet-2);}\n  .uc .tool .ti{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;font-size:14px;flex-shrink:0;\n    background:linear-gradient(140deg, rgba(123,108,246,.16), rgba(232,121,185,.16)); color:var(--violet); filter:grayscale(1) brightness(.4);}\n  /* message-type + membership chips */\n  .mtype{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:500; padding:8px 14px; border-radius:999px;\n    background:rgba(123,108,246,.14); border:1px solid rgba(123,108,246,.3); color:var(--violet-2);}\n  .mtype.light{background:#fff; border:1px solid #e7e3d9; color:#46435a;}\n  /* event type selector */\n  .etypes{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:920px; margin:0 auto;}\n  .etype{background:#15131f; border:1px solid rgba(255,255,255,.09); border-radius:18px; padding:18px;\n    display:flex; flex-direction:column; gap:5px; transition:transform .35s, border-color .35s, background .35s; cursor:default;}\n  .etype:hover{transform:translateY(-4px); border-color:var(--violet-2); background:#1a1726;}\n  .etype .eti{font-size:26px; color:var(--violet-2); margin-bottom:4px;}\n  .etype b{font-size:15px; font-weight:600;}\n  .etype span{font-size:12px; color:#a7a4b8; line-height:1.55;}\n  .eformat{display:inline-flex; align-items:center; gap:9px; padding:10px 18px; border-radius:999px; font-size:14px; font-weight:500;\n    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.14);}\n  .eformat .efd{width:9px;height:9px;border-radius:50%;box-shadow:0 0 10px currentColor;}\n  /* growth loop + metrics */\n  .gstep{background:#fff;border:1px solid #e9e5dc;border-radius:18px;padding:18px 20px;text-align:center;min-width:150px;\n    display:flex;flex-direction:column;gap:4px;transition:transform .35s;}\n  .gstep:hover{transform:translateY(-4px);}\n  .gstep .gn{width:28px;height:28px;border-radius:50%;margin:0 auto 6px;display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(140deg,var(--grad-a),var(--grad-b));}\n  .gstep b{font-size:16px;color:var(--ink);}\n  .gstep span{font-size:12px;color:#8a8575;}\n  .garrow{font-size:22px;color:var(--violet-2);}\n  .garrow.gloop{font-size:26px;animation:spin 6s linear infinite;}\n  .gmetric{background:#fff;border:1px solid #e9e5dc;border-radius:16px;padding:18px 14px;text-align:center;}\n  .gmetric .gv{font-size:30px;font-weight:700;letter-spacing:-1px;background:linear-gradient(120deg,var(--grad-a),var(--grad-b));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}\n  .gmetric .gl{font-size:12px;color:#6a6776;margin-top:4px;}\n  /* persona need cards (dark) */\n  .pneed{background:#15131f;border:1px solid rgba(255,255,255,.09);border-radius:22px;padding:26px;transition:transform .4s,border-color .4s;}\n  .pneed:hover{transform:translateY(-5px);border-color:var(--violet-2);}\n  .pneed .pic{width:50px;height:50px;border-radius:15px;display:grid;place-items:center;margin-bottom:16px;background:linear-gradient(140deg,var(--grad-a),var(--grad-b));}\n  .pneed .pic svg{width:26px;height:26px;}\n  .pneed h4{font-size:19px;font-weight:600;margin-bottom:8px;letter-spacing:-.3px;}\n  .pneed p{font-size:13.5px;line-height:1.75;color:#b9b7c6;font-weight:300;}\n  /* problem bubbles — refined floating chips with unread dot */\n  .bubble{box-shadow:0 10px 30px -12px rgba(0,0,0,.5);}\n  .bubble::after{content:'';position:absolute;top:-4px;inset-inline-start:-4px;width:9px;height:9px;border-radius:50%;background:#ff5a7a;box-shadow:0 0 10px #ff5a7a;}\n  @media(max-width:780px){ .gmetric{padding:14px 8px;} .gmetric .gv{font-size:24px;} .garrow{display:none;} #growth .wrap > div:nth-child(3){grid-template-columns:1fr 1fr !important;} }\n  .erow rv.d4{} /* events tools stagger */\n  .etypes.in .etype, .erow.in .ecard{animation:popIn .55s cubic-bezier(.2,.8,.2,1) both;}\n  .etypes.in .etype:nth-child(2){animation-delay:.06s} .etypes.in .etype:nth-child(3){animation-delay:.12s}\n  .etypes.in .etype:nth-child(4){animation-delay:.18s} .etypes.in .etype:nth-child(5){animation-delay:.24s} .etypes.in .etype:nth-child(6){animation-delay:.3s}\n  .erow.in .ecard:nth-child(2){animation-delay:.06s} .erow.in .ecard:nth-child(3){animation-delay:.12s}\n  .erow.in .ecard:nth-child(4){animation-delay:.18s} .erow.in .ecard:nth-child(5){animation-delay:.24s} .erow.in .ecard:nth-child(6){animation-delay:.3s}\n  @keyframes popIn{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}\n  @media(max-width:780px){ .etypes{grid-template-columns:1fr 1fr !important;} }\n  /* join-mode cards */\n  .jcard{background:#fff; border:1px solid #e9e5dc; border-radius:24px; padding:30px 26px; text-align:center;\n    transition:transform .4s, box-shadow .4s;}\n  .jcard:hover{transform:translateY(-5px); box-shadow:0 24px 50px -24px rgba(60,58,140,.35);}\n  .jcard .jic{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;margin:0 auto 16px;}\n  .jcard .jic svg{width:28px;height:28px;}\n  .jcard h4{font-size:21px;font-weight:600;color:var(--ink);margin-bottom:8px;letter-spacing:-.3px;}\n  .jcard p{font-size:13.5px;line-height:1.75;color:#5a5768;}\n  @media(max-width:780px){ #members .wrap > div:nth-child(2){grid-template-columns:1fr !important;} }\n  @media(max-width:780px){ .erow{grid-template-columns:1fr 1fr !important;} .uc{padding:24px;} .uc h4{font-size:19px;} }\n\n  /* phone mock */\n  .phone{position:absolute; inset-inline:50%; top:50%; transform:translate(50%,-50%); width:230px; height:480px;\n    background:#0a0913; border-radius:34px; border:7px solid #211f30; box-shadow:0 30px 70px -20px rgba(0,0,0,.7); padding:14px;}\n  .msg{margin-bottom:9px; max-width:78%; padding:9px 13px; border-radius:14px; font-size:12px; line-height:1.5;}\n  .msg.them{background:#211f30;}\n  .msg.us{background:linear-gradient(135deg,#1f8a5b,#22c79a); margin-inline-start:auto; border-bottom-left-radius:4px;}\n  .statbar{display:flex; gap:24px; flex-wrap:wrap; margin-top:26px;}\n  .stat .n{font-size:34px; font-weight:600; letter-spacing:-1px;}\n  .stat .l{font-size:12.5px; color:var(--muted); margin-top:2px;}\n\n  /* WALLET act */\n  .coin{width:120px;height:120px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%, #ffe9a8, var(--amber) 55%, #c98a1c);\n    box-shadow:0 20px 50px -12px rgba(246,185,72,.55), inset 0 -8px 16px rgba(0,0,0,.2);\n    display:grid; place-items:center; font-size:46px; margin:0 auto 30px;}\n\n  /* FINALE */\n  #finale .stage{background:radial-gradient(120% 90% at 50% 0%, rgba(108,92,231,.3), transparent 55%);}\n  .cta{display:inline-flex; align-items:center; gap:10px; padding:16px 30px; border-radius:999px; font-size:16px; font-weight:600;\n    background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); color:#fff; text-decoration:none; margin-top:30px;\n    box-shadow:0 20px 50px -14px rgba(108,92,231,.6); transition:transform .25s;}\n  .cta:hover{transform:translateY(-3px);}\n  .signoff{margin-top:40px; font-size:14px; color:var(--muted);}\n  @media(max-width:780px){\n    .wrap{padding:0 20px;}\n    .huge{font-size:clamp(34px,11vw,52px) !important;}\n    .big{font-size:clamp(27px,8vw,40px) !important;}\n    .lede{font-size:15px !important;}\n    .feat{grid-template-columns:1fr !important; gap:26px !important;}\n    .feat.flip .visual{order:-1;}\n    .statbar{gap:16px !important;}\n    .etypes{grid-template-columns:1fr 1fr !important;}\n    #members .wrap > div:nth-child(2), #persona .wrap > div:last-child, .erow{grid-template-columns:1fr !important;}\n    .gmetric .gv{font-size:22px !important;}\n    .uc{padding:20px !important;} .uc h4{font-size:18px !important;}\n    .pcard{flex:0 0 84vw !important; min-height:56vh; padding:28px !important;}\n    #brand{inset-inline-end:14px; top:14px;}\n    #tweaksPanel{inset-inline-start:10px; width:200px;}\n    #stickyCta{font-size:13px; padding:11px 20px;}\n    .bubble{font-size:11px !important; padding:7px 11px !important;}\n    .orbit{width:230px; height:230px;}\n  }\n\n  .light{background:var(--paper); color:var(--ink);}\n  .light .lede{color:#4a4856;}\n  .light .kicker{color:var(--violet);}\n\n  @media(max-width:780px){\n    .feat{grid-template-columns:1fr; gap:30px;}\n    .feat.flip .visual{order:-1;}\n    .phone{width:180px;height:380px;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"rail\"><\u002Fdiv>\n<div id=\"brand\"><img src=\"1067f401-81e7-41ac-a047-5a4ec633bfa6\" alt=\"محور\" style=\"height:26px; display:block\"><\u002Fdiv>\n<a id=\"stickyCta\" href=\"https://mhwar.com/c/mhwar1\" target=\"_blank\" rel=\"noopener\" style=\"position:fixed; bottom:22px; inset-inline-start:50%; transform:translateX(-50%) translateY(24px); z-index:260; opacity:0; pointer-events:none; transition:opacity .5s, transform .5s; display:inline-flex; align-items:center; gap:8px; padding:13px 26px; border-radius:999px; font-family:inherit; font-size:14px; font-weight:600; color:#fff; text-decoration:none; background:linear-gradient(135deg,var(--grad-a),var(--grad-b)); box-shadow:0 16px 40px -12px rgba(108,92,231,.6);\">انضمّ إلى مجتمع محور ←<\u002Fa>\n<script type=\"application/json\" id=\"tweaks-config\">/*EDITMODE-BEGIN*/{\n  \"device\": \"web\"\n}/*EDITMODE-END*/<\u002Fscript>\n<div id=\"tweaksPanel\" style=\"position:fixed; top:16px; inset-inline-start:18px; z-index:300; display:none; background:rgba(20,18,30,.82); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.14); border-radius:16px; padding:14px 16px; width:220px; font-family:inherit; color:#fff;\">\n  <div style=\"font-size:13px; font-weight:600; margin-bottom:10px\">Tweaks<\u002Fdiv>\n  <div style=\"font-size:11px; color:#a7a4b8; margin-bottom:7px\">المعاينة<\u002Fdiv>\n  <div style=\"display:flex; gap:5px; background:rgba(255,255,255,.06); border-radius:999px; padding:4px\">\n    <button id=\"tkWeb\" onclick=\"mhSetDevice('web')\" style=\"flex:1;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:7px 0;border-radius:999px;background:#fff;color:#14130f;\">🖥️ ويب<\u002Fbutton>\n    <button id=\"tkMob\" onclick=\"mhSetDevice('mobile')\" style=\"flex:1;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:7px 0;border-radius:999px;background:transparent;color:#fff;\">📱 جوال<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div id=\"phonePreview\" style=\"position:fixed; inset:0; z-index:280; display:none; background:radial-gradient(circle at 50% 30%, #2a2740, #0c0b14); place-items:center;\">\n  <div style=\"text-align:center\">\n    <div style=\"width:390px; max-width:92vw; height:84vh; background:#0a0913; border:10px solid #211f30; border-radius:44px; box-shadow:0 40px 90px -30px rgba(0,0,0,.8); overflow:hidden; position:relative;\">\n      <div style=\"position:absolute; top:0; inset-inline:0; height:26px; display:flex; justify-content:center; z-index:2; pointer-events:none\"><div style=\"width:120px;height:20px;background:#211f30;border-radius:0 0 16px 16px\"><\u002Fdiv><\u002Fdiv>\n      <iframe id=\"phoneFrame\" style=\"width:100%; height:100%; border:none;\" title=\"معاينة الجوال\"><\u002Fiframe>\n    <\u002Fdiv>\n    <div style=\"margin-top:16px; color:#a7a4b8; font-size:12.5px\">معاينة الجوال · فعّل/أوقف من لوحة Tweaks<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ HERO ============ -->\n<section class=\"act\" id=\"hero\" style=\"height:140vh\">\n  <div class=\"stage\">\n    <div class=\"glow\"><\u002Fdiv><div class=\"glow2\"><\u002Fdiv>\n    <div class=\"wrap\" style=\"text-align:center; position:relative\">\n      <div class=\"orbit rv in\">\n        <div class=\"ring r3\"><span class=\"node\"><\u002Fspan><span class=\"node alt\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ring r2\"><span class=\"node\"><\u002Fspan><span class=\"node side\"><\u002Fspan><\u002Fdiv>\n        <div class=\"ring r1\"><span class=\"node\"><\u002Fspan><span class=\"node alt\"><\u002Fspan><\u002Fdiv>\n        <div class=\"mark\"><img src=\"1067f401-81e7-41ac-a047-5a4ec633bfa6\" alt=\"محور\" style=\"height:34px;display:block\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kicker rv in d1\">منصّة إدارة المجتمعات والفعاليّات<\u002Fdiv>\n      <h1 class=\"huge rv in d2\">مجتمعك يستحقّ<br><span class=\"grad-text\">أكثر من قروب.<\u002Fspan><\u002Fh1>\n      <p class=\"lede rv in d3\" style=\"margin:26px auto 0\">اجمع جمهورك في مكان تملكه، أوصِل رسالتك عبر واتساب والبريد، وأدِر فعاليّاتك من الدعوة إلى الشهادة.<br>«محور» — المركز الذي يدور حوله كل ذلك.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"scrollcue\">مرّر للأسفل<span class=\"arrow\"><\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ THE PROBLEM ============ -->\n<section class=\"act problem\" id=\"problem\" style=\"height:300vh\">\n  <div class=\"stage\">\n    <div class=\"bubbles\">\n      <div class=\"bubble\" style=\"top:18%; inset-inline-start:12%\">📱 قروب واتساب آخر…<\u002Fdiv>\n      <div class=\"bubble\" style=\"top:30%; inset-inline-end:14%\">📧 إيميل ضاع في الأرشيف<\u002Fdiv>\n      <div class=\"bubble\" style=\"top:62%; inset-inline-start:9%\">🎟️ من سجّل في الفعالية؟<\u002Fdiv>\n      <div class=\"bubble\" style=\"top:72%; inset-inline-end:11%\">📊 إكسل لا ينتهي<\u002Fdiv>\n      <div class=\"bubble\" style=\"top:45%; inset-inline-start:46%\">🔕 رسالة وصلت متأخّرة<\u002Fdiv>\n      <div class=\"bubble\" style=\"top:14%; inset-inline-end:40%\">😵‍💫 خمس أدوات مختلفة<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"wrap\" style=\"text-align:center\">\n      <div class=\"kicker rv\">المشكلة<\u002Fdiv>\n      <h2 class=\"big rv d1\">تبني جمهوراً…<br><span style=\"color:var(--muted)\">ثم تفقده في الضجيج.<\u002Fspan><\u002Fh2>\n      <p class=\"lede rv d2\" style=\"margin:24px auto 0\">قروبات تتكاثر بلا ذاكرة، رسائل لا أحد يفتحها، فعاليّات تُدار بإكسل ودعوات يدويّة،<br>وجمهورٌ تعِبت في جمعه… يتسرّب لأنّ صوتك لم يصله في الوقت المناسب.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHO YOU ARE ============ -->\n<section class=\"act\" id=\"persona\" style=\"height:260vh\">\n  <div class=\"stage\">\n    <div class=\"wrap\">\n      <div style=\"text-align:center; max-width:760px; margin:0 auto 44px\">\n        <div class=\"kicker rv\">لكنّك تعرف الحقيقة<\u002Fdiv>\n        <h2 class=\"big rv d1\">أنت لستَ شركة تقنية —<br><span class=\"grad-text\">أنت من جمعَ الناس.<\u002Fspan><\u002Fh2>\n        <p class=\"lede rv d2\" style=\"margin:22px auto 0\">أسّستَ جمعيّةً أو ناديًا أو مجلسًا يلتفّ حول فكرة تؤمن بها، والناس يثقون بك ويتبعونك. تستحقّ أدوات تخدمك، لا تحاربك.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px; max-width:980px; margin:0 auto\">\n        <div class=\"pneed rv d1\">\n          <div class=\"pic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\"><path d=\"M3 11l18-8-8 18-2-8-8-2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h4>أن يصِل صوته<\u002Fh4><p>رسالةٌ واحدة مهمّة تضيع بين مئات الرسائل في قروبٍ لا أحد يقرؤه.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"pneed rv d2\">\n          <div class=\"pic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\"><path d=\"M17 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"9.5\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M22 21v-2a4 4 0 00-3-3.87\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h4>أن يحفظ جمهوره<\u002Fh4><p>قائمة أعضائه مبعثرة بين إكسل وهواتف وردود — يفقدها مع كل تغيير.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"pneed rv d3\">\n          <div class=\"pic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\"><path d=\"M3 17l6-6 4 4 8-8\"><\u002Fpath><path d=\"M17 7h4v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h4>أن ينمو بثقة<\u002Fh4><p>يريد التركيز على رسالته وأثره، لا على وصل خمس أدوات لا تتفاهم.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ THE SPARK ============ -->\n<section class=\"act spark\" id=\"spark\" style=\"height:220vh\">\n  <div class=\"stage\">\n    <div class=\"wrap\" style=\"text-align:center\">\n      <div class=\"kicker rv\">اللحظة<\u002Fdiv>\n      <h2 class=\"big rv d1\">فماذا لو دارت<br><span class=\"grad-text\">حول محورٍ واحد؟<\u002Fspan><\u002Fh2>\n      <p class=\"lede rv d2\" style=\"margin:24px auto 0\">كل ما تبنيه — جمهورك، رسائلك، فعاليّاتك، محتواك —<br>يجتمع حول نقطة واحدة تملكها أنت. هنا يبدأ الإنقاذ.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ INTRODUCING ============ -->\n<section class=\"act\" id=\"intro\" style=\"height:160vh\">\n  <div class=\"stage light\">\n    <div class=\"wrap\" style=\"text-align:center\">\n      <div class=\"kicker rv\">نُقدّم لكم<\u002Fdiv>\n      <h2 class=\"huge rv d1\">محور<\u002Fh2>\n      <p class=\"lede rv d2\" style=\"margin:22px auto 0; font-weight:400\">المركز الذي يجمع جمهورك، محتواك، وفعاليّاتك في مكان واحد.<br>تبني مجتمعك · تحفظ جمهورك · تُوصِل رسالتك · فتكبر دائرتك.<\u002Fp>\n      <div class=\"rv d3\" style=\"display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:28px\">\n        <span class=\"mtype light\">⚡ ابدأ خلال دقائق<\u002Fspan>\n        <span class=\"mtype light\">🔒 بياناتك ملكك<\u002Fspan>\n        <span class=\"mtype light\">🎁 جرّب مجّاناً ١٤ يوماً<\u002Fspan>\n        <span class=\"mtype light\">✕ بدون بطاقة ائتمان<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PATTERNS (horizontal drag) ============ -->\n<section class=\"act\" id=\"patterns\" style=\"height:420vh\">\n  <div class=\"stage\" style=\"display:block\">\n    <div style=\"position:absolute; top:11vh; inset-inline:0; text-align:center; z-index:5\">\n      <div class=\"kicker\">الأساس<\u002Fdiv>\n      <h2 class=\"big\">ثلاثة أنماط. مجتمع واحد.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"position:absolute; top:50%; transform:translateY(-50%); inset-inline:0\">\n      <div class=\"track\" id=\"ptrack\">\n        <div class=\"pcard\" style=\"background:linear-gradient(160deg,#1c2d4a,#101a2e)\">\n          <div class=\"ico\">◇<\u002Fdiv>\n          <div><div class=\"pno\">٠١ — OPEN<\u002Fdiv><h3>مفتوح<\u002Fh3>\n          <p>تسجيل عام، نشرات للجمهور الواسع، صفحات هبوط مفتوحة. مثاليّ للفعاليات العامّة وحملات التوعية.<\u002Fp>\n          <ul><li>صفحات هبوط للفعاليات<\u002Fli><li>نشرات بريدية للجمهور<\u002Fli><li>نموّ بلا حدود<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pcard\" style=\"background:linear-gradient(160deg,#3a1c4a,#220f2e)\">\n          <div class=\"ico\">◈<\u002Fdiv>\n          <div><div class=\"pno\">٠٢ — CLOSED<\u002Fdiv><h3>مغلق<\u002Fh3>\n          <p>عضويّة بدعوة، محاضر وقرارات موثّقة، قنوات رسميّة. للمجالس والجمعيّات المهنيّة واللجان.<\u002Fp>\n          <ul><li>جلسات ومحاضر<\u002Fli><li>تصويت موثّق<\u002Fli><li>قنوات رسميّة معتمدة<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pcard\" style=\"background:linear-gradient(160deg,#1c4a3a,#0f2e22)\">\n          <div class=\"ico\">⬡<\u002Fdiv>\n          <div><div class=\"pno\">٠٣ — HYBRID<\u002Fdiv><h3>هجين<\u002Fh3>\n          <p>نواة مغلقة للأعضاء + طبقة عامّة للفعاليات والنشرات. للغرف التجاريّة والتجمّعات القطاعيّة.<\u002Fp>\n          <ul><li>عضويّة خاصّة + فعاليات عامّة<\u002Fli><li>مرونة كاملة<\u002Fli><li>الأفضل للنموّ المتدرّج<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pcard\" style=\"background:linear-gradient(160deg,#2a2540,#14111f); border-style:dashed\">\n          <div class=\"ico grad-text\">✦<\u002Fdiv>\n          <div><div class=\"pno\">والأجمل<\u002Fdiv><h3>تختار النمط<br>ويعمل فوراً<\u002Fh3>\n          <p>كل نمط يحمل قواعده وقوالبه جاهزة لحظة تفعيله. لا إعدادات معقّدة — فقط اختَر وابدأ.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hint\">← مرّر لاستكشاف الأنماط<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ COMMUNITY MANAGEMENT & MEMBERSHIP ============ -->\n<section class=\"act\" id=\"members\" style=\"height:240vh\">\n  <div class=\"stage light\">\n    <div class=\"wrap\">\n      <div style=\"text-align:center; max-width:760px; margin:0 auto 44px\">\n        <div class=\"kicker rv\">إدارة المجتمع<\u002Fdiv>\n        <h2 class=\"big rv d1\">أنت تتحكّم<br><span class=\"grad-text\">بمن ينضمّ.<\u002Fspan><\u002Fh2>\n        <p class=\"lede rv d2\" style=\"margin:22px auto 0; color:#4a4856\">أضِف أعضاءك، نظّم عضويّاتهم، واختر كيف ينضمّ الناس إلى مجتمعك — بابٌ مفتوح، دائرةٌ خاصّة، أو انضمامٌ بموافقتك.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px; max-width:980px; margin:0 auto\">\n        <div class=\"jcard rv d1\">\n          <div class=\"jic\" style=\"background:linear-gradient(140deg,#22c79a,#1f8a5b)\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8 12h8M12 8v8\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h4>مفتوح<\u002Fh4>\n          <p>أي شخص ينضمّ فوراً عبر رابط أو صفحة. مثاليّ للنموّ السريع والجمهور العام.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"jcard rv d2\">\n          <div class=\"jic\" style=\"background:linear-gradient(140deg,#7b6cf6,#5a4ad1)\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\"><path d=\"M7 11V8a5 5 0 0110 0v3\"><\u002Fpath><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n          <h4>خاصّ<\u002Fh4>\n          <p>بدعوة فقط. دائرة مغلقة للأعضاء المعتمدين — مجالس، لجان، وروابط خاصّة.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"jcard rv d3\">\n          <div class=\"jic\" style=\"background:linear-gradient(140deg,#f6b948,#d98a1c)\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.7\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h4>بموافقة<\u002Fh4>\n          <p>يطلب الشخص الانضمام، وتوافق أنت. توازنٌ بين الانفتاح والتحكّم في من يدخل.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rv d3\" style=\"max-width:980px; margin:18px auto 0; display:flex; flex-wrap:wrap; gap:10px; justify-content:center\">\n        <span class=\"mtype light\">👥 إضافة الأعضاء واستيرادهم<\u002Fspan>\n        <span class=\"mtype light\">🏷️ مستويات عضويّة (مجانيّة/مدفوعة)<\u002Fspan>\n        <span class=\"mtype light\">🛡️ أدوار وصلاحيّات<\u002Fspan>\n        <span class=\"mtype light\">✅ طلبات الانضمام والموافقات<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHATSAPP FIRST ============ -->\n<section class=\"act\" id=\"whatsapp\" style=\"height:200vh\">\n  <div class=\"stage\">\n    <div class=\"wrap\">\n      <div class=\"feat\">\n        <div class=\"rv\">\n          <div class=\"chip\">⌬ التواصل والإرسال<\u002Fdiv>\n          <h2 class=\"big\">لكل رسالة…<br>قناتها الصحيحة.<\u002Fh2>\n          <p class=\"lede\" style=\"margin-top:18px\">تذكير قبل فعاليّة، دعوة لحدث، خبر عاجل، نشرة شهريّة، أو شهادة إتمام — لكلٍّ منها شكلها وتوقيتها. ومحور توصلها عبر القناتين الأقوى من لوحة واحدة.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin:18px 0 6px\">\n            <span class=\"mtype\">🔔 تذكير<\u002Fspan><span class=\"mtype\">🎫 دعوة<\u002Fspan><span class=\"mtype\">📣 خبر عاجل<\u002Fspan><span class=\"mtype\">🗞️ نشرة<\u002Fspan><span class=\"mtype\">🏅 شهادة<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"statbar\">\n            <div class=\"stat\"><div class=\"n grad-text\">واتساب<\u002Fdiv><div class=\"l\">تنبيهات تصل وتُقرأ فوراً<\u002Fdiv><\u002Fdiv>\n            <div class=\"stat\"><div class=\"n grad-text\">البريد<\u002Fdiv><div class=\"l\">نشرات ومحتوى وشهادات<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"visual rv d2\" style=\"display:grid; place-items:center\">\n          <div style=\"display:flex; gap:14px; align-items:center; width:86%\">\n            <div class=\"phone\" style=\"position:relative; inset:auto; transform:none; width:170px; height:330px; flex-shrink:0\">\n              <div style=\"font-size:10px;color:#22c79a;margin-bottom:8px\">● واتساب<\u002Fdiv>\n              <div class=\"msg them\" style=\"font-size:11px\">تذكير: ملتقاكم غداً ٧م 🔔<\u002Fdiv>\n              <div class=\"msg us\" style=\"font-size:11px\">تم ✅<\u002Fdiv>\n              <div class=\"msg them\" style=\"font-size:11px\">تذكرتك بالـ QR 🎟️<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:#fff; border-radius:16px; border:1px solid #e6e3dc; padding:14px; color:var(--ink)\">\n              <div style=\"font-size:10px;color:#6c5ce7;margin-bottom:8px\">✉ البريد<\u002Fdiv>\n              <div style=\"font-weight:600;font-size:13px;margin-bottom:4px\">نشرة المجتمع · أكتوبر<\u002Fdiv>\n              <div style=\"font-size:11px;color:#8a8575;line-height:1.6\">أبرز ما حدث، الفعاليّة القادمة، وقصص من أعضائكم…<\u002Fdiv>\n              <div style=\"margin-top:10px;height:6px;background:#f0ede5;border-radius:3px\"><\u002Fdiv>\n              <div style=\"margin-top:6px;height:6px;width:70%;background:#f0ede5;border-radius:3px\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHO IT'S FOR ============ -->\n<!-- ============ WHO IT'S FOR (scroll-expanding feed) ============ -->\n<section class=\"act\" id=\"usecases\">\n  <div class=\"ucwrap\">\n    <div style=\"text-align:center; max-width:760px; margin:0 auto\">\n      <div class=\"kicker rv\">لمن صُنعت محور<\u002Fdiv>\n      <h2 class=\"big rv d1\">إن كنتَ تجمع الناس…<br><span class=\"grad-text\">فمحور لك.<\u002Fspan><\u002Fh2>\n      <p class=\"lede rv d2\" style=\"margin:22px auto 0; color:#4a4856\">مهما اختلف مجالك، إن كان حولك جمهور تريد أن تبقى على تواصل معه — مرّر ببطء، ودع كل قصّة تتّضح.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"ufeed\">\n      <div class=\"uc\"><div class=\"uhead\"><div class=\"uic\">♥<\u002Fdiv><div><h4>المنظّمات غير الربحيّة<\u002Fh4><div class=\"utag\">جمعيّات خيريّة ومؤسّسات أهليّة<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"more\"><p>تعتمدون على المتطوّعين والمتبرّعين، لكن التواصل مبعثر ورسائلكم تضيع وتفاعلهم يبرد. محور تُبقيكم على صلة دائمة — حملات ونشرات ودعوات تصل فعلاً وتُقرأ، مع قياس الأثر وتوثيق المشاركة.<\u002Fp>\n          <div class=\"toolrow\"><span class=\"tool\"><span class=\"ti\">📣<\u002Fspan>حملات واتساب + بريد<\u002Fspan><span class=\"tool\"><span class=\"ti\">🎟️<\u002Fspan>دعوات الفعاليّات<\u002Fspan><span class=\"tool\"><span class=\"ti\">📰<\u002Fspan>نشرات الأثر<\u002Fspan><span class=\"tool\"><span class=\"ti\">📊<\u002Fspan>قياس التفاعل<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"uc\"><div class=\"uhead\"><div class=\"uic\">★<\u002Fdiv><div><h4>الأندية الطلابيّة والجامعيّة<\u002Fh4><div class=\"utag\">مجتمع نشِط رغم تغيّر الأعضاء<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"more\"><p>الأندية تنبض بالنشاط، لكن الأعضاء يتغيّرون كل فصل والتواصل يعتمد على قروب يضيع فيه كل شيء. محور تمنح ناديكم مساحة منظّمة: تسجيل أعضاء، فعاليّات وورش، إعلانات فوريّة، ونشرة تُبقي الطلاب متّصلين.<\u002Fp>\n          <div class=\"toolrow\"><span class=\"tool\"><span class=\"ti\">📝<\u002Fspan>تسجيل الأعضاء<\u002Fspan><span class=\"tool\"><span class=\"ti\">🎓<\u002Fspan>فعاليّات وورش<\u002Fspan><span class=\"tool\"><span class=\"ti\">📢<\u002Fspan>إعلانات فوريّة<\u002Fspan><span class=\"tool\"><span class=\"ti\">📬<\u002Fspan>نشرة النادي<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"uc\"><div class=\"uhead\"><div class=\"uic\">⬡<\u002Fdiv><div><h4>مجتمعات الشركات والعلامات<\u002Fh4><div class=\"utag\">حوّل المهتمّين إلى مجتمع تملكه<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"more\"><p>جمهوركم المهتمّ بالعلامة مبعثر بين إنستغرام وقروب واتساب وقائمة بريد قديمة — لا تملكون أيّاً منها فعلاً. محور تحفظ جمهوركم في مكان واحد تملكونه، وتوصلكم به بالأخبار والتحديثات والعروض.<\u002Fp>\n          <div class=\"toolrow\"><span class=\"tool\"><span class=\"ti\">👥<\u002Fspan>قائمة جمهور محفوظة<\u002Fspan><span class=\"tool\"><span class=\"ti\">📰<\u002Fspan>نشرات دوريّة<\u002Fspan><span class=\"tool\"><span class=\"ti\">🎁<\u002Fspan>أخبار وعروض<\u002Fspan><span class=\"tool\"><span class=\"ti\">🎯<\u002Fspan>شرائح مستهدفة<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"uc\"><div class=\"uhead\"><div class=\"uic\">◈<\u002Fdiv><div><h4>المجتمعات المهنيّة المتخصّصة<\u002Fh4><div class=\"utag\">تجمّعات الممارسين والخبراء<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"more\"><p>تجمعون ممارسين وخبراء يبحثون عن المعرفة والفرص، وربّما تديرون برامج تدريب ودفعات — لكن النقاش يتشتّت واللقاءات تُدار يدويّاً. محور تنظّم مجتمعكم المهني: عضويّات، لقاءات وورش، دفعات تدريبيّة بجداولها، وشهادات حضور وإتمام موثّقة.<\u002Fp>\n          <div class=\"toolrow\"><span class=\"tool\"><span class=\"ti\">🎫<\u002Fspan>عضويّات منظّمة<\u002Fspan><span class=\"tool\"><span class=\"ti\">🎓<\u002Fspan>لقاءات وورش<\u002Fspan><span class=\"tool\"><span class=\"ti\">📚<\u002Fspan>دفعات تدريبيّة<\u002Fspan><span class=\"tool\"><span class=\"ti\">🏅<\u002Fspan>شهادات إتمام<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"uc\"><div class=\"uhead\"><div class=\"uic\">⬣<\u002Fdiv><div><h4>المجالس الأسريّة والروابط<\u002Fh4><div class=\"utag\">تواصل منظّم للعوائل الكبيرة<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"more\"><p>العوائل الكبيرة والروابط تحتاج تواصلاً منظّماً — مناسبات، أخبار، وصناديق عائليّة — يضيع كلّه في قروبات متفرّقة. محور تمنح رابطتكم مساحة خاصّة: دعوات المناسبات، نشرة العائلة، وتسجيل منظّم للأفراد.<\u002Fp>\n          <div class=\"toolrow\"><span class=\"tool\"><span class=\"ti\">🎉<\u002Fspan>دعوات المناسبات<\u002Fspan><span class=\"tool\"><span class=\"ti\">📬<\u002Fspan>نشرة العائلة<\u002Fspan><span class=\"tool\"><span class=\"ti\">📒<\u002Fspan>سجلّ الأفراد<\u002Fspan><span class=\"tool\"><span class=\"ti\">🔔<\u002Fspan>إعلانات خاصّة<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"uc\"><div class=\"uhead\"><div class=\"uic\">◇<\u002Fdiv><div><h4>الديوانيّات والمبادرات المحليّة<\u002Fh4><div class=\"utag\">مجالس ثقافيّة واجتماعيّة دوريّة<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"more\"><p>الديوانيّات والمبادرات تلتقي بانتظام وتعتمد على الحضور والتفاعل، لكن الدعوة والتذكير والمتابعة عبء يدويّ. محور تؤتمت اللقاء الدوري: دعوة، تأكيد حضور، تذكير، وأرشيف لما يُطرح في كل جلسة.<\u002Fp>\n          <div class=\"toolrow\"><span class=\"tool\"><span class=\"ti\">🗓️<\u002Fspan>لقاءات دوريّة<\u002Fspan><span class=\"tool\"><span class=\"ti\">✅<\u002Fspan>تأكيد حضور<\u002Fspan><span class=\"tool\"><span class=\"ti\">⏰<\u002Fspan>تذكيرات آليّة<\u002Fspan><span class=\"tool\"><span class=\"ti\">📁<\u002Fspan>أرشيف الجلسات<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"uc\"><div class=\"uhead\"><div class=\"uic\">✦<\u002Fdiv><div><h4>المجموعات والهوايات المستقلّة<\u002Fh4><div class=\"utag\">تجمّعات حرّة حول شغف مشترك<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"more\"><p>تجمعكم هواية أو شغف — رياضة، فنّ، قراءة — بلا كيان رسميّ، فقط مجموعة تريد أن تنظّم لقاءاتها وتنمو. محور تمنحكم البساطة: صفحة للمجموعة، تسجيل، فعاليّات، وتواصل يُبقي الجميع على الموعد.<\u002Fp>\n          <div class=\"toolrow\"><span class=\"tool\"><span class=\"ti\">🌐<\u002Fspan>صفحة المجموعة<\u002Fspan><span class=\"tool\"><span class=\"ti\">⚡<\u002Fspan>تسجيل سريع<\u002Fspan><span class=\"tool\"><span class=\"ti\">🎯<\u002Fspan>لقاءات وأنشطة<\u002Fspan><span class=\"tool\"><span class=\"ti\">⏰<\u002Fspan>تذكيرات الموعد<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ EVENTS ============ -->\n<section class=\"act\" id=\"events\" style=\"height:auto\">\n  <div class=\"stage\" style=\"position:relative; height:auto; min-height:auto; overflow:visible; display:block; padding:14vh 0 12vh\">\n    <div class=\"wrap\">\n      <div style=\"text-align:center; margin-bottom:30px\">\n        <div class=\"kicker rv\">أدوات الفعاليات<\u002Fdiv>\n        <h2 class=\"big rv d1\">فعاليّة من أيّ نوع.<br>تُدار من البداية.<\u002Fh2>\n        <p class=\"lede rv d2\" style=\"margin:18px auto 0\">ابدأ باختيار نوع فعاليّتك وصيغتها — ومحور تجهّز كل ما بعدها تلقائيّاً.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- STEP 1: type -->\n      <div class=\"rv d2\" style=\"text-align:center; font-size:12px; letter-spacing:2px; color:var(--violet-2); margin-bottom:14px\">① اختر النوع<\u002Fdiv>\n      <div class=\"etypes rv d2\">\n        <div class=\"etype\"><span class=\"eti\">◴<\u002Fspan><b>دورة / ورشة عمل<\u002Fb><span>تعليم وتطبيق لتطوير المهارات<\u002Fspan><\u002Fdiv>\n        <div class=\"etype\"><span class=\"eti\">◈<\u002Fspan><b>ندوة / ملتقى<\u002Fb><span>متحدّثون وخبراء ونقاش متخصّص<\u002Fspan><\u002Fdiv>\n        <div class=\"etype\"><span class=\"eti\">⬡<\u002Fspan><b>لقاء / جلسة تواصل<\u002Fb><span>بناء علاقات وتوسيع الشبكة<\u002Fspan><\u002Fdiv>\n        <div class=\"etype\"><span class=\"eti\">◷<\u002Fspan><b>اجتماع دوري<\u002Fb><span>جلسة تنظيميّة مغلقة للقرارات<\u002Fspan><\u002Fdiv>\n        <div class=\"etype\"><span class=\"eti\">⛰<\u002Fspan><b>رحلة / نشاط ميداني<\u002Fb><span>نشاط حركيّ خارج القاعات<\u002Fspan><\u002Fdiv>\n        <div class=\"etype\"><span class=\"eti\">◇<\u002Fspan><b>بطولة / منافسة<\u002Fb><span>تحدّيات حركيّة أو رقميّة بين الأعضاء<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STEP 2: format -->\n      <div class=\"rv d3\" style=\"text-align:center; font-size:12px; letter-spacing:2px; color:var(--violet-2); margin:30px 0 14px\">② حدّد الصيغة<\u002Fdiv>\n      <div class=\"rv d3\" style=\"display:flex; gap:12px; justify-content:center; flex-wrap:wrap\">\n        <span class=\"eformat\"><span class=\"efd\" style=\"background:#22c79a\"><\u002Fspan>حضوريّة<\u002Fspan>\n        <span class=\"eformat\"><span class=\"efd\" style=\"background:#7b6cf6\"><\u002Fspan>أونلاين<\u002Fspan>\n        <span class=\"eformat\"><span class=\"efd\" style=\"background:#f6b948\"><\u002Fspan>هجينة<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- STEP 3: tools -->\n      <div class=\"rv d4\" style=\"text-align:center; font-size:12px; letter-spacing:2px; color:var(--violet-2); margin:30px 0 14px\">③ ومحور تتكفّل بالباقي<\u002Fdiv>\n      <div class=\"erow rv d4\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px\">\n        <div class=\"ecard\"><div class=\"en\">٠١<\u002Fdiv><h4>صفحة ودعوات<\u002Fh4><p>صفحة هبوط بهويّتك + دعوات تُرسل عبر واتساب والبريد بضغطة.<\u002Fp><\u002Fdiv>\n        <div class=\"ecard\"><div class=\"en\">٠٢<\u002Fdiv><h4>تأكيد حضور (RSVP)<\u002Fh4><p>تأكيدٌ بنقرة يتحوّل فوراً إلى تذكرة — مع إدارة المقاعد وقوائم الانتظار.<\u002Fp><\u002Fdiv>\n        <div class=\"ecard\"><div class=\"en\">٠٣<\u002Fdiv><h4>تذكرة QR أو رابط دخول<\u002Fh4><p>تذكرة QR للحضوريّة، أو رابط بثّ خاصّ للأونلاين — لكلّ صيغة أداتها.<\u002Fp><\u002Fdiv>\n        <div class=\"ecard\"><div class=\"en\">٠٤<\u002Fdiv><h4>تذكيرات مؤتمتة<\u002Fh4><p>قبل يوم · قبل ساعتين · عند البدء — تُرسل تلقائيّاً بلا تدخّل منك.<\u002Fp><\u002Fdiv>\n        <div class=\"ecard\"><div class=\"en\">٠٥<\u002Fdiv><h4>تسجيل دخول وحضور<\u002Fh4><p>امسح الـ QR عند الباب أو تابع حضور الأونلاين — لحظيّاً.<\u002Fp><\u002Fdiv>\n        <div class=\"ecard\"><div class=\"en\">٠٦<\u002Fdiv><h4>شهادات + استبيان<\u002Fh4><p>استبيان بعدي سريع، ثم شهادة بهويّتك ورمز تحقّق تُصدَر آليّاً.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ COMMUNITY PULSE — posts / news / surveys / discussions ============ -->\n<section class=\"act\" id=\"pulse\" style=\"height:230vh\">\n  <div class=\"stage\">\n    <div class=\"wrap\">\n      <div class=\"feat\">\n        <div class=\"rv\">\n          <div class=\"chip\">◉ نبض المجتمع<\u002Fdiv>\n          <h2 class=\"big\">مجتمعك حيّ.<br>وله صوت.<\u002Fh2>\n          <p class=\"lede\" style=\"margin-top:18px\">لا تكتفِ بالإرسال في اتجاه واحد. انشر الأخبار والمنشورات، أطلق استبياناً يقيس الرأي، أو افتح نقاشاً يتفاعل فيه أعضاؤك — كل ذلك في مساحة مجتمعك المنظّمة، بعيداً عن فوضى القروبات.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:18px\">\n            <span class=\"mtype\">📰 أخبار ومنشورات<\u002Fspan><span class=\"mtype\">📊 استبيانات<\u002Fspan><span class=\"mtype\">💬 نقاشات<\u002Fspan><span class=\"mtype\">📌 إعلانات مثبّتة<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"visual rv d2\" style=\"display:grid; place-items:center; background:#14121f\">\n          <div style=\"width:82%; display:flex; flex-direction:column; gap:11px\">\n            <div style=\"background:#1b1928;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 15px\">\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\"><span style=\"width:24px;height:24px;border-radius:50%;background:linear-gradient(140deg,var(--grad-a),var(--grad-b));display:inline-block\"><\u002Fspan><b style=\"font-size:12px\">إعلان · فريق محور<\u002Fb><span style=\"margin-inline-start:auto;font-size:10px;color:var(--muted)\">📌<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:12px;color:#c9c7d6;line-height:1.6\">لقاؤنا الشهري الجمعة القادمة — سجّلوا الآن 🎉<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#1b1928;border:1px solid rgba(108,92,231,.3);border-radius:14px;padding:13px 15px\">\n              <div style=\"font-size:11px;color:var(--violet-2);margin-bottom:9px\">📊 استبيان · ما موضوع الورشة القادمة؟<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px\">\n                <div style=\"position:relative;background:#26223a;border-radius:7px;height:24px;overflow:hidden\"><div style=\"position:absolute;inset:0;width:62%;background:linear-gradient(90deg,var(--grad-a),var(--grad-b));opacity:.5\"><\u002Fdiv><span style=\"position:relative;font-size:10.5px;line-height:24px;padding-inline-start:10px\">التصميم · 62%<\u002Fspan><\u002Fdiv>\n                <div style=\"position:relative;background:#26223a;border-radius:7px;height:24px;overflow:hidden\"><div style=\"position:absolute;inset:0;width:38%;background:#3a3550\"><\u002Fdiv><span style=\"position:relative;font-size:10.5px;line-height:24px;padding-inline-start:10px\">البرمجة · 38%<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#1b1928;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 15px\">\n              <div style=\"font-size:11px;color:#22c79a;margin-bottom:6px\">💬 نقاش · 14 ردّاً<\u002Fdiv>\n              <div style=\"font-size:12px;color:#c9c7d6;line-height:1.6\">«ما أفضل وقت للقاءات؟» — تفاعل الأعضاء…<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ GROWTH / NEWSLETTERS ============ -->\n<section class=\"act\" id=\"growth\" style=\"height:auto\">\n  <div class=\"stage light\" style=\"position:relative; height:auto; min-height:auto; overflow:visible; display:block; padding:16vh 0 14vh\">\n    <div class=\"wrap\">\n      <div style=\"text-align:center; max-width:720px; margin:0 auto 50px\">\n        <div class=\"chip rv\" style=\"background:rgba(108,92,231,.12)\">▤ المحتوى والنمو<\u002Fdiv>\n        <h2 class=\"big rv d1\">كل رسالة…<br><span class=\"grad-text\">تُنبت العضو التالي.<\u002Fspan><\u002Fh2>\n        <p class=\"lede rv d2\" style=\"margin:20px auto 0; color:#4a4856\">المجتمع الذي لا يُغذّى يذبل. محور تحوّل تواصلك إلى دورة نموّ ذاتيّة: محتوى يبقي الناس، تفاعل يجذب غيرهم، وأعضاء جدد يبدؤون الدورة من جديد.<\u002Fp>\n      <\u002Fdiv>\n      <!-- growth loop -->\n      <div class=\"rv d2\" style=\"display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; max-width:960px; margin:0 auto 40px\">\n        <div class=\"gstep\"><span class=\"gn\">١<\u002Fspan><b>انشر<\u002Fb><span>نشرة · خبر · استبيان<\u002Fspan><\u002Fdiv>\n        <span class=\"garrow\">→<\u002Fspan>\n        <div class=\"gstep\"><span class=\"gn\">٢<\u002Fspan><b>تفاعل<\u002Fb><span>فتح · ردّ · مشاركة<\u002Fspan><\u002Fdiv>\n        <span class=\"garrow\">→<\u002Fspan>\n        <div class=\"gstep\"><span class=\"gn\">٣<\u002Fspan><b>ينضمّ غيرهم<\u002Fb><span>عبر دعوة عضو لعضو<\u002Fspan><\u002Fdiv>\n        <span class=\"garrow gloop\">↻<\u002Fspan>\n      <\u002Fdiv>\n      <!-- live metrics -->\n      <div class=\"rv d3\" style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px; max-width:920px; margin:0 auto\">\n        <div class=\"gmetric\"><div class=\"gv\">٨٧٪<\u002Fdiv><div class=\"gl\">معدّل فتح النشرة<\u002Fdiv><\u002Fdiv>\n        <div class=\"gmetric\"><div class=\"gv\">+٣١٠<\u002Fdiv><div class=\"gl\">عضو جديد هذا الشهر<\u002Fdiv><\u002Fdiv>\n        <div class=\"gmetric\"><div class=\"gv\">٤٢٪<\u002Fdiv><div class=\"gl\">تفاعل شهريّ<\u002Fdiv><\u002Fdiv>\n        <div class=\"gmetric\"><div class=\"gv\">×٣<\u002Fdiv><div class=\"gl\">نموّ خلال ٦ أشهر<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"rv d3\" style=\"text-align:center; font-size:12.5px; color:#8a8575; margin-top:22px\">نشرات دوريّة لكل مجتمع · رحلات تواصل تتفرّع حسب سلوك كل عضو · قياس أثر يوضّح ما ينجح.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WALLET / FAIR BILLING ============ -->\n<section class=\"act\" id=\"wallet\" style=\"height:200vh\">\n  <div class=\"stage\">\n    <div class=\"wrap\" style=\"text-align:center\">\n      <div class=\"coin rv\">◎<\u002Fdiv>\n      <div class=\"kicker rv d1\">فوترة عادلة<\u002Fdiv>\n      <h2 class=\"big rv d2\">اشتراك للميزات.<br>محفظة لرسائلك.<\u002Fh2>\n      <p class=\"lede rv d3\" style=\"margin:22px auto 0\">نظام هجين عادل: تدفع اشتراكاً ثابتاً للقدرات، وتستخدم محفظة رقميّة مرنة تدفع فيها فقط مقابل ما ترسله فعلاً. بلا مفاجآت، بلا هدر.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FINALE ============ -->\n<section class=\"act\" id=\"finale\" style=\"height:130vh\">\n  <div class=\"stage\">\n    <div class=\"wrap\" style=\"text-align:center; position:relative; z-index:2\">\n      <div class=\"mark rv\" style=\"width:64px;height:64px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(140deg,var(--grad-a),var(--grad-b));margin:0 auto 24px;font-size:32px;font-weight:700\">م<\u002Fdiv>\n      <div class=\"kicker rv d1\">والآن دوركم<\u002Fdiv>\n      <h2 class=\"huge rv d2\">كونوا أوّل<br><span class=\"grad-text\">من يدور معنا.<\u002Fspan><\u002Fh2>\n      <p class=\"lede rv d3\" style=\"margin:22px auto 0\">بنيت محور لتكون المركز الذي تدور حوله المجتمعات وتتحوّل إلى أثر حقيقي.<br>وأنتم — أصدقائي والمقرّبون — أوّل من أشاركهم البداية. 🤍<\u002Fp>\n      <a class=\"cta rv d4\" href=\"https://mhwar.com/c/mhwar1\" target=\"_blank\" rel=\"noopener\">انضمّ إلى مجتمع محور ←<\u002Fa>\n      <div class=\"signoff rv d4\">mhwar.com/c/mhwar1 · صُنع بشغف · محور Mhwar · ٢٠٢٦<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script>\n  // progress rail + brand\n  const rail = document.getElementById('rail');\n  const brand = document.getElementById('brand');\n  function onScroll(){\n    const h = document.documentElement.scrollHeight - innerHeight;\n    const p = Math.min(1, scrollY / h);\n    rail.style.width = (p*100)+'%';\n    brand.classList.toggle('show', scrollY > innerHeight*0.6);\n    var sc=document.getElementById('stickyCta'); if(sc){ var on=scrollY>innerHeight*1.4 && scrollY < (document.documentElement.scrollHeight-innerHeight*1.6); sc.style.opacity=on?'1':'0'; sc.style.pointerEvents=on?'auto':'none'; sc.style.transform='translateX(-50%) translateY('+(on?0:24)+'px)'; }\n    drivePatterns();\n    driveUsecases();\n  }\n  addEventListener('scroll', onScroll, {passive:true});\n  addEventListener('resize', onScroll);\n\n  // reveal observer\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });\n  }, {threshold:.18});\n  document.querySelectorAll('.rv:not(.in)').forEach(el=>io.observe(el));\n\n  // problem bubbles lit when section centered\n  const problem = document.getElementById('problem');\n  const io2 = new IntersectionObserver((entries)=>{\n    entries.forEach(e=> e.target.classList.toggle('lit', e.isIntersecting));\n  }, {threshold:.4});\n  io2.observe(problem);\n\n  // horizontal drag-scroll for patterns, driven by vertical scroll progress\n  const patterns = document.getElementById('patterns');\n  const track = document.getElementById('ptrack');\n  const ucards = [...document.querySelectorAll('.uc')];\n  function driveUsecases(){\n    const cy = innerHeight/2;\n    let best=null, bestD=1e9;\n    ucards.forEach(c=>{ const r=c.getBoundingClientRect(); const d=Math.abs((r.top+r.bottom)/2 - cy); if(d<bestD){bestD=d; best=c;} });\n    ucards.forEach(c=> c.classList.toggle('active', c===best && bestD < innerHeight*0.55));\n  }\n  function drivePatterns(){\n    const rect = patterns.getBoundingClientRect();\n    const total = patterns.offsetHeight - innerHeight;\n    const passed = Math.min(Math.max(-rect.top,0), total);\n    const prog = total>0 ? passed/total : 0;          // 0..1\n    const max = track.scrollWidth - innerWidth*0.92;\n    // RTL: move track to the negative (content slides in from the start side)\n    track.style.transform = 'translateX('+ (prog*max) +'px)';\n  }\n  onScroll();\n  // Tweaks protocol (host-driven) — device preview toggle\n  function mhReadTweaks(){ try{ const m=document.getElementById('tweaks-config').textContent.match(/\\{[\\s\\S]*\\}/); return m?JSON.parse(m[0]):{}; }catch(e){ return {}; } }\n  window.mhSetDevice = function(v){\n    const pp=document.getElementById('phonePreview'), web=document.getElementById('tkWeb'), mob=document.getElementById('tkMob');\n    if(v==='mobile'){ document.getElementById('phoneFrame').src=location.pathname+'?embed=1'; pp.style.display='grid';\n      mob.style.background='#fff'; mob.style.color='#14130f'; web.style.background='transparent'; web.style.color='#fff'; }\n    else { pp.style.display='none'; document.getElementById('phoneFrame').src='about:blank';\n      web.style.background='#fff'; web.style.color='#14130f'; mob.style.background='transparent'; mob.style.color='#fff'; }\n    try{ window.parent.postMessage({type:'__edit_mode_set_keys', edits:{device:v}}, '*'); }catch(e){}\n  };\n  if(location.search.indexOf('embed')===-1){\n    window.addEventListener('message', (ev)=>{\n      if(ev.data?.type==='__activate_edit_mode') document.getElementById('tweaksPanel').style.display='block';\n      if(ev.data?.type==='__deactivate_edit_mode') document.getElementById('tweaksPanel').style.display='none';\n    });\n    try{ window.parent.postMessage({type:'__edit_mode_available'}, '*'); }catch(e){}\n    mhSetDevice(mhReadTweaks().device==='mobile'?'mobile':'web');\n  }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
